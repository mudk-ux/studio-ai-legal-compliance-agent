# ---------------------------------------------------------------------------
# Ground-truth manifest for the benchmark asset suite.
#
# Derived by direct inspection of the assets (2026-07-11):
#   - mock_sports_clothing.jpg    -> clear Nike swooshes (jacket + leggings)
#   - mock_vaping_device.jpg      -> 'Vuse' branded vape pen (tobacco/vape S&P)
#   - mock_luxury_handbag.jpg     -> Damier-style checkered canvas LOOKALIKE;
#                                    no explicit LV monogram visible => uncertain
#   - sintel script               -> deliberately salted: 'Sony field recorder'
#                                    and 'apple device prop' repeated 120x
#   - good_will_hunting script    -> 'DUNKIN' DOUGHNUTS coffee' (real brand);
#                                    'DO YOU LIKE APPLES?' is fruit, NOT Apple Inc
#                                    (forbidden-entity precision trap); file has
#                                    scraped HTML/JS noise at the top
#   - earnest / pygmalion         -> clean period-piece negative controls
#
# KNOWN DATA ISSUES in the original zip (byte-identical MD5s):
#   - elephantsdream_teaser.mp4 == big_buck_bunny_clip.mp4  (one is mislabeled;
#     do NOT expect a Samsung display sighting in either)
#   - cc0_open_prop_beverage_can.jpg == mock_luxury_handbag.jpg (there is no
#     beverage-can image; entry omitted here)
#
# Scoring semantics (evals/scoring.py):
#   expected_entities:  must be detected with severity >= min_severity -> recall
#   forbidden_entities: must NOT appear as a finding at >= MEDIUM      -> precision traps
#   expected_verdict:   exact match per profile
#   uncertain: true     -> asset is reported for human labeling, not scored
# ---------------------------------------------------------------------------

defaults:
  target_rating: TV-PG
  show_context: "Benchmark clearance audit"

assets:
  - id: social_network_script
    file: social_network_script.txt
    modality: TEXT_SCREENPLAY
    profiles:
      clean_control:
        exclusivity_deals: { primary_sponsor: "Starbucks", restricted_competitors: ["Dunkin' Donuts"] }
        # RELABELED after round-2 live run: Gemini grades the docudrama
        # portrayal of Zuckerberg/Saverin/Parker as HIGH right-of-publicity
        # risk, and HIGH blocks — legally correct for this script regardless
        # of the sponsor profile. (LLM risk grading can vary between runs; if
        # this flaps to CONDITIONAL_CLEARANCE, record it, don't chase it.)
        expected_verdict: BLOCKED
      active_conflict:
        exclusivity_deals: { primary_sponsor: "Starbucks", restricted_competitors: ["Facebook", "Harvard"] }
        expected_verdict: BLOCKED
    expected_entities:
      - { name: "Facebook",          type: ORGANIZATION, min_severity: MEDIUM }
      - { name: "Harvard",           type: ORGANIZATION, min_severity: MEDIUM }
      - { name: "Mark Zuckerberg",   type: PERSON,       min_severity: MEDIUM }  # real living public figure
      - { name: "Eduardo Saverin",   type: PERSON,       min_severity: MEDIUM }
      - { name: "Sean Parker",       type: PERSON,       min_severity: MEDIUM }
    forbidden_entities: []

  - id: good_will_hunting_script
    file: good_will_hunting_script.txt
    modality: TEXT_SCREENPLAY
    notes: "Contains scraped HTML/JS noise at the head of the file; pipeline must tolerate it."
    profiles:
      clean_control:
        exclusivity_deals: { primary_sponsor: "Starbucks", restricted_competitors: ["Winston"] }
        # RELABELED after round-2 live run: the script contains a capitalized
        # 'Budweiser' (line ~5884); ALCOHOL branding is disallowed under TV-PG,
        # which is CRITICAL -> BLOCKED in any sponsor profile.
        expected_verdict: BLOCKED
      active_conflict:
        exclusivity_deals: { primary_sponsor: "Starbucks", restricted_competitors: ["Dunkin' Donuts"] }
        expected_verdict: BLOCKED   # alias match: DUNKIN' DOUGHNUTS -> Dunkin' Donuts
    expected_entities:
      # NL misses the all-caps action-line mention; only findable via the
      # constraint-term scan, i.e. when Dunkin' is a restricted term.
      - { name: "Dunkin' Doughnuts", type: ORGANIZATION, min_severity: MEDIUM, aliases: ["Dunkin' Donuts", "Dunkin"], profiles: [active_conflict] }
      - { name: "Harvard",           type: ORGANIZATION, min_severity: MEDIUM }
      - { name: "Budweiser",         type: ORGANIZATION, min_severity: HIGH }   # S&P alcohol violation via term scan
    forbidden_entities:
      - { name: "Apple", reason: "'DO YOU LIKE THEM APPLES' is fruit, not Apple Inc." }
      - { name: "Gerald Lambeau", reason: "Fictional character; LLM analysis must not flag as living person >= MEDIUM." }

  - id: importance_of_being_earnest_script
    file: importance_of_being_earnest_script.txt
    modality: TEXT_SCREENPLAY
    profiles:
      clean_control:
        exclusivity_deals: { primary_sponsor: "General Mills", restricted_competitors: ["Nike"] }
        expected_verdict: CLEARED
      person_name_trap:
        # Character surnames listed as 'competitors' must NOT match PERSON entities
        exclusivity_deals: { primary_sponsor: "General Mills", restricted_competitors: ["Worthing", "Bracknell"] }
        expected_verdict: CLEARED
    expected_entities: []
    forbidden_entities:
      - { name: "Nike", reason: "No modern brands exist in this 1895 play." }

  - id: pygmalion_script
    file: pygmalion_theatrical_script.txt
    modality: TEXT_SCREENPLAY
    profiles:
      clean_control:
        exclusivity_deals: { primary_sponsor: "PepsiCo", restricted_competitors: ["McDonald's"] }
        expected_verdict: CLEARED
    expected_entities: []
    forbidden_entities:
      - { name: "Apple", reason: "Lowercase 'apple' mentions are fruit." }

  - id: sintel_script
    file: sintel_open_movie_script.txt
    modality: TEXT_SCREENPLAY
    notes: "Synthetic positive control: salted with 'Sony field recorder' / 'apple device prop' x120."
    profiles:
      sony_primary:
        exclusivity_deals: { primary_sponsor: "Sony", restricted_competitors: ["Apple"] }
        expected_verdict: BLOCKED
      no_deal:
        exclusivity_deals: { primary_sponsor: null, restricted_competitors: [] }
        expected_verdict: CONDITIONAL_CLEARANCE
    expected_entities:
      - { name: "Sony",  type: ORGANIZATION, min_severity: INFO }
      # 'apple' is lowercase in the text ('an apple device prop'); NL treats it
      # as a common noun, so it's only findable via the constraint-term scan.
      - { name: "Apple", type: ORGANIZATION, min_severity: MEDIUM, profiles: [sony_primary] }

  - id: sports_clothing_image
    file: mock_sports_clothing.jpg
    modality: VISUAL_IMAGE
    profiles:
      nike_primary:
        exclusivity_deals: { primary_sponsor: "Nike", restricted_competitors: ["Adidas"] }
        expected_verdict: CLEARED   # Nike is the sponsor -> SPONSOR_VERIFIED (INFO)
      adidas_primary:
        exclusivity_deals: { primary_sponsor: "Adidas", restricted_competitors: ["Nike"] }
        expected_verdict: BLOCKED
    expected_entities:
      - { name: "Nike", type: BRAND, min_severity: INFO }

  - id: vaping_device_image
    file: mock_vaping_device.jpg
    modality: VISUAL_IMAGE
    notes: "S&P control: TOBACCO_VAPE branding must block under TV-PG regardless of sponsor profile."
    profiles:
      any_profile:
        exclusivity_deals: { primary_sponsor: "Gucci", restricted_competitors: ["Louis Vuitton"] }
        expected_verdict: BLOCKED
    expected_entities:
      - { name: "Vuse", type: BRAND, min_severity: HIGH }

  - id: luxury_handbag_image
    file: mock_luxury_handbag.jpg
    modality: VISUAL_IMAGE
    notes: >
      LABELED 2026-07 from live run: Vision returns NO logo detections for the
      Damier-style lookalike (no explicit monogram). Known limitation: pattern-
      similarity infringement needs a contextual/multimodal pass, not logo
      detection. Verdict is legitimately CLEARED under the current rule set.
    profiles:
      lv_restricted:
        exclusivity_deals: { primary_sponsor: "Gucci", restricted_competitors: ["Louis Vuitton"] }
        expected_verdict: CLEARED
    expected_entities: []
    forbidden_entities: []

  - id: tears_of_steel_video
    file: tears_of_steel_1080p.mov
    modality: TEMPORAL_VIDEO
    notes: >
      LABELED 2026-07 from round-2 live run (completed in ~596s with the 1800s
      timeout). Video Intelligence returned 30 MEDIUM detections; most are
      known logo-model false positives on CG/sci-fi content (sports team
      marks, insurance companies) with sub-second track durations. Scored on
      the one verifiable anchor: the Blender logo (0.93, two multi-second
      tracks ~00:10:21 and ~00:11:41 — it IS a Blender Foundation film).
      No Sony detection; the legacy 'Sony monitor at 00:02:28' claim is
      disproven. Flicker false positives are honest MEDIUMs under current
      rules; a track-duration/confidence floor is a candidate future rule.
    profiles:
      sony_primary:
        exclusivity_deals: { primary_sponsor: "Sony", restricted_competitors: ["Apple"] }
        expected_verdict: CONDITIONAL_CLEARANCE
    expected_entities:
      - { name: "Blender", type: BRAND, min_severity: MEDIUM }
    forbidden_entities: []

  - id: device_promo_clip_video
    file: big_buck_bunny_clip.mp4
    modality: TEMPORAL_VIDEO
    notes: >
      LABELED 2026-07 from live run. Despite the filename (and being
      byte-identical to elephantsdream_teaser.mp4), the content is NOT an open
      movie: Video Intelligence detects a Sony Xperia XZ Premium (0.87,
      00:00:09-00:00:19), Jaguar Cars (0.87), Steingraeber & Söhne (0.87) and
      an M4 carbine (0.85) — it appears to be device-promo footage. Scored on
      the two most stable detections; source a real Elephants Dream teaser if
      you want an open-movie negative control.
    profiles:
      sony_primary:
        exclusivity_deals: { primary_sponsor: "Sony", restricted_competitors: ["Samsung"] }
        expected_verdict: CONDITIONAL_CLEARANCE   # Sony = sponsor (INFO); Jaguar et al. uncleared MEDIUM
    expected_entities:
      - { name: "Sony Xperia XZ Premium", type: BRAND, min_severity: INFO, aliases: ["Sony"] }
      - { name: "Jaguar Cars",            type: BRAND, min_severity: MEDIUM, aliases: ["Jaguar"] }
    forbidden_entities: []

  - id: peach_trailer_video
    file: blender_peach_open_trailer.m4v
    modality: TEMPORAL_VIDEO
    uncertain: true
    notes: >
      DEMOTED to unscored 2026-07-12: the Creative Commons logo card detection
      is run-variable (hit at 0.928 in round 2, missed entirely in round 3).
      Video Intelligence is not deterministic near its confidence threshold,
      so this is not stable ground truth — record detections verbatim each
      run instead of scoring. Both CLEARED and CONDITIONAL_CLEARANCE are
      plausible correct outputs.
    profiles:
      intel_primary:
        exclusivity_deals: { primary_sponsor: "Intel", restricted_competitors: ["AMD"] }
        expected_verdict: null
